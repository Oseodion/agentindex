name: Collect marketplace data

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-marketplace-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run collector
        run: node collector/index.js
        env:
          RUN_ONCE: 'true'

      - name: Keep server alive
        run: curl -s https://agentindex-ngcn.onrender.com/health

      - name: Commit and push updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force data/agentindex.db
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: hourly snapshot"
            git push
          fi
